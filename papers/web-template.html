<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>$title$ — allocation</title>
<style>
  :root{--bg:#fafafa;--text:#1a1a1a;--muted:#5a5a5a;--faint:#9a9a9a;--accent:#4a3aff;--border:#e6e6e6}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.65;font-size:17px}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  code{background:#f1f1f4;padding:1px 5px;border-radius:3px;font-size:.92em;
    font-family:"SFMono-Regular",Menlo,Consolas,monospace}
  .crumb{max-width:760px;margin:0 auto;padding:20px 24px 0;display:flex;gap:18px;font-size:.95rem}
  .crumb a{color:var(--muted)} .crumb a:hover{color:var(--accent)}
  main{max-width:760px;margin:14px auto 0;padding:0 24px 40px}
  h1{font-size:1.95rem;line-height:1.25;margin:.3em 0 .1em}
  .author{color:var(--muted);margin:.2em 0 1.4em}
  .abstract{background:#fff;border:1px solid var(--border);border-radius:8px;
    padding:14px 18px;margin:0 0 28px;font-size:.97rem;color:#2a2a2a}
  h2{font-size:1.3rem;margin:1.9em 0 .5em;border-bottom:1px solid var(--border);padding-bottom:3px}
  h3{font-size:1.06rem;margin:1.4em 0 .35em}
  p{margin:.7em 0}
  .math.display{overflow-x:auto;overflow-y:hidden}
  table{border-collapse:collapse;margin:16px 0;font-size:.95rem;width:100%}
  th,td{text-align:left;padding:7px 12px;border-bottom:1px solid var(--border)}
  thead th{border-bottom:2px solid var(--border)}
  figure{margin:20px 0;text-align:center} figure img{max-width:100%;height:auto}
  figcaption{color:var(--muted);font-size:.9rem;margin-top:6px}
  .references{font-size:.92rem} .references div{margin:.4em 0}
  footer{max-width:760px;margin:24px auto 40px;padding:18px 24px 0;border-top:1px solid var(--border);
    color:var(--faint);font-size:.85rem} footer a{color:var(--muted)}
</style>
$math$
</head>
<body>
<div class="crumb">
  <a href="../../">&larr; allocation</a>
  <a href="../">papers</a>
  <a href="https://github.com/microprediction/allocation">GitHub</a>
</div>
<main>
<h1>$title$</h1>
$if(author)$<p class="author">$for(author)$$author$$sep$, $endfor$</p>$endif$
$if(abstract)$<div class="abstract">$abstract$</div>$endif$
$body$
</main>
<footer>
  allocation &middot; MIT licensed &middot;
  <a href="https://github.com/microprediction/allocation">microprediction/allocation</a>
</footer>
</body>
</html>
